<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIGO POSIX - Ultimate Dashboard</title>
    <style>
        :root { --primary: #1d5ba3; --bg: #f0f3f7; --card: #ffffff; --green: #27ae60; --orange: #f39c12; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 0; color: #333; }
        .header { background: var(--primary); color: white; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .brand { display: flex; align-items: center; font-weight: bold; }
        .logo-img { height: 32px; width: auto; margin-right: 10px; border-radius: 4px; }
        .container { padding: 15px; max-width: 480px; margin: auto; }
        .card { background: var(--card); padding: 18px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1.5px solid #e0e4e9; border-radius: 8px; font-size: 16px; outline: none; background: #fafbfc; box-sizing: border-box; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 25px; font-weight: bold; font-size: 15px; cursor: pointer; margin-top: 12px; }

        .status-header { display: flex; justify-content: space-between; background: #dae5f2; padding: 10px 15px; border-radius: 10px 10px 0 0; font-size: 13px; font-weight: bold; color: #34495e; }
        .list-container { background: var(--card); border-radius: 0 0 10px 10px; padding: 5px 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .recorder-item { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1f1f1; }
        .recorder-item:last-child { border-bottom: none; }
        .avatar { width: 55px; height: 55px; border-radius: 10px; object-fit: cover; background: #ddd; margin-right: 15px; border: 1px solid #eee; }
        .info { flex-grow: 1; overflow: hidden; }
        .id-name { font-weight: 800; font-size: 15px; margin: 0; }

        .status-line { display: flex; align-items: center; font-size: 11px; font-weight: bold; margin: 3px 0; }
        .dot { width: 7px; height: 7px; border-radius: 50%; margin-right: 5px; }
        .status-pending { color: var(--orange); }
        .status-pending .dot { background: var(--orange); }
        .status-active { color: var(--green); }
        .status-active .dot { background: var(--green); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .btn-stop { background: white; color: var(--primary); border: 1.5px solid var(--primary); padding: 5px 15px; border-radius: 6px; font-weight: bold; font-size: 12px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="brand">
            <img src="{{ url_for('static', filename='icon.png') }}" class="logo-img" onerror="this.style.display='none'">
            <span>BIGO POSIX</span>
        </div>
        <div style="font-size: 11px; opacity: 0.8;">BIGO ENGINE V2</div>
    </div>

    <div class="container">
        <div class="card">
            <form action="/handle" method="POST">
                <input type="text" name="bigo_id" placeholder="Masukkan ID Host..." required autocomplete="off">
                <button type="submit" name="action" value="add" class="btn-add">MULAI REKAM</button>
            </form>
        </div>

        <div class="status-header">
            <span>AKTIF REKAM</span>
            <span>{{ workers|length }}/20</span>
        </div>
        <div class="list-container">
            {% for item in workers %}
            <div class="recorder-item">
                <img src="{{ item.thumb }}" class="avatar" onerror="this.src='{{ url_for('static', filename='icon.png') }}';">
                <div class="info">
                    <p class="id-name">{{ item.id }}</p>
                    <div class="status-line status-pending" data-start="{{ item.start_time }}">
                        <span class="dot"></span>
                        <span class="status-text">INITIALIZING...</span>
                    </div>
                    <p style="font-size:11px; color:#888; margin:0;"> 🕒 <span class="timer" data-start="{{ item.start_time }}">00:00:00</span></p>
                </div>
                <form action="/handle" method="POST">
                    <input type="hidden" name="bigo_id" value="{{ item.id }}">
                    <button type="submit" name="action" value="stop" class="btn-stop">STOP</button>
                </form>
            </div>
            {% else %}
            <div style="text-align:center; color:#bbb; padding:30px; font-size:13px;">Belum ada rekaman.</div>
            {% endfor %}
        </div>
    </div>

    <script>
        function updateUI() {
            let now = Math.floor(Date.now() / 1000);
            document.querySelectorAll('.recorder-item').forEach(item => {
                let start = parseInt(item.querySelector('.timer').getAttribute('data-start'));
                let diff = now - start;

                let h = Math.floor(diff/3600).toString().padStart(2,'0');
                let m = Math.floor((diff%3600)/60).toString().padStart(2,'0');
                let s = (diff%60).toString().padStart(2,'0');
                item.querySelector('.timer').innerText = h+":"+m+":"+s;

                let statusLine = item.querySelector('.status-line');
                if (diff > 25 && statusLine.classList.contains('status-pending')) {
                    statusLine.classList.remove('status-pending');
                    statusLine.classList.add('status-active');
                    statusLine.querySelector('.status-text').innerText = 'RECORDING';
                }
            });
        }
        setInterval(updateUI, 1000);
        updateUI();
    </script>
</body>
</html>
