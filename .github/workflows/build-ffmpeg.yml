name: Build FFmpeg Sakti Bigo

on:
  workflow_dispatch: # Supaya bisa klik tombol "Run" manual di HP

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build FFmpeg via Android Maker
        # Kita pakai tool otomatis yang paling stabil untuk urusan OpenSSL
        run: |
          git clone https://github.com/Javernaut/ffmpeg-android-maker.git
          cd ffmpeg-android-maker
          # Jalankan build khusus arm64-v8a (Untuk Infinix Hot 40i)
          # Kita tambahkan OpenSSL (Wajib buat HTTPS)
          ./ffmpeg-android-maker.sh \
            --target-abis=arm64-v8a \
            --enable-openssl \
            --enable-libx264 \
            --enable-libx265

      - name: Upload Hasil Jadi (.so)
        uses: actions/upload-artifact@v4
        with:
          name: libffmpeg-sakti-abang
          # Lokasi hasil build biasanya di sini
          path: ffmpeg-android-maker/output/lib/arm64-v8a/libffmpeg.so
