name: Build FFmpeg Sakti Bigo

on:
  workflow_dispatch: 

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build FFmpeg via Android Maker
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential nasm yasm cmake ninja-build pkg-config autoconf libtool
          
          git clone https://github.com/Javernaut/ffmpeg-android-maker.git
          cd ffmpeg-android-maker
          
          export ANDROID_SDK_HOME=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}
          
          ./ffmpeg-android-maker.sh \
            --target-abis=arm64-v8a \
            --enable-openssl \
            --enable-gpl \
            --enable-libx264 \
            --enable-libx265

      - name: Cek Hasil Rakitan
        run: |
          echo "--- DAFTAR FILE .SO YANG DITEMUKAN ---"
          find ffmpeg-android-maker/output/lib/arm64-v8a/ -name "*.so"

      - name: Upload Pasukan Badak (.so)
        uses: actions/upload-artifact@v4
        with:
          name: pasukan-badak-bigo
          # KUNCINYA DI SINI: Kita ambil SEMUA yang berakhiran .so
          path: ffmpeg-android-maker/output/lib/arm64-v8a/*.so
