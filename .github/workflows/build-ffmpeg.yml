name: Build FFmpeg Sakti Bigo

on:
  workflow_dispatch: 

jobs:
  build-ffmpeg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r25c

      - name: Build FFmpeg via Android Maker
        run: |
          # 1. Install alat tempur
          sudo apt-get update
          sudo apt-get install -y build-essential nasm yasm cmake ninja-build pkg-config

          # 2. Persiapan Folder
          git clone https://github.com/Javernaut/ffmpeg-android-maker.git
          cd ffmpeg-android-maker

          # 3. EXPORT LANGSUNG (Ini kuncinya, Bang!)
          # Kita arahkan ke folder standar SDK di GitHub Runner
          export ANDROID_SDK_HOME=/usr/local/lib/android/sdk
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}

          # 4. Jalankan Perakit
          ./ffmpeg-android-maker.sh \
            --target-abis=arm64-v8a \
            --enable-openssl \
            --enable-libx264 \
            --enable-libx265

      - name: Upload Hasil Jadi (.so)
        uses: actions/upload-artifact@v4
        with:
          name: libffmpeg-sakti-abang
          path: ffmpeg-android-maker/output/lib/arm64-v8a/libffmpeg.so
